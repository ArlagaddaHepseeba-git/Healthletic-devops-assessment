replicaCount: 2

image:
  repository: hepseeba/healthletic-flask-api
  pullPolicy: IfNotPresent
  tag: "v1"

service:
  type: NodePort
  port: 5000

containerPort: 5000

ingress:
  enabled: false

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 5
