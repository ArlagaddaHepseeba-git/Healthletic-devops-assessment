name: Healthletic DevOps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_TAG: v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
           python -m pip install --upgrade pip
           pip install -r app/requirements.txt

      - name: Run Application Test
        run: |
          python -m py_compile app/app.py

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
           context: ./app
           file: ./app/Dockerfile
           push: true
           tags: hepseeba/healthletic-flask-api:${{ env.IMAGE_TAG }}

      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hepseeba/healthletic-flask-api:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: helm lint flask-api

      - name: Helm Template Validation
        run: helm template backend flask-api

      - name: Simulated Deployment
        run: echo "Deployment validated successfully"

      - name: Simulated Smoke Test
        run: echo "Health check passed"

      - name: Simulated Rollback
        if: failure()
        run: echo "Rollback completed"
